  - url: openapi/3plcentral-openapi.yml
    type: OpenAPI
  - url: collections/3plcentral.postman_collection.json
    type: PostmanCollection
  - url: collections/3plcentral.opencollection.json
    type: OpenCollection
  description: Read the packages (cartons) associated with a shipped order via
    /orders/{orderId}/packages - carton dimensions, weights, tracking numbers, and
    contained items. Modeled from the documented order-packages sub-resource.
