  humanURL: https://developer.3plcentral.com/
  baseURL: https://secure-wms.com
  properties:
  - url: https://developer.3plcentral.com/
    type: Documentation
  - url: openapi/3plcentral-openapi.yml
    type: OpenAPI
  - url: collections/3plcentral.postman_collection.json
    type: PostmanCollection
  - url: collections/3plcentral.opencollection.json
    type: OpenCollection
  description: Read rolled-up stock summaries via /inventory/stocksummaries - aggregated
    on-hand, available, allocated, and committed quantities keyed by facility and
    item. The lightweight availability view used to drive channel listings and
    reorder logic.
- aid: 3plcentral:3plcentral-receivers-api
  name: 3PL Warehouse Manager Receivers (ASN) API
  tags:
  - Receivers
  - ASN
