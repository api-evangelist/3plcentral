  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.3plcentral.com/
  baseURL: https://secure-wms.com
  properties:
  - url: https://developer.3plcentral.com/
    type: Documentation
  - url: openapi/3plcentral-openapi.yml
    type: OpenAPI
  - url: collections/3plcentral.postman_collection.json
    type: PostmanCollection
  - url: collections/3plcentral.opencollection.json
    type: OpenCollection
  description: Create and retrieve inbound receivers (Advance Ship Notices) via
    /inventory/receivers - the expected inbound shipments a warehouse receives
    against. Supports creating a receiver, listing receivers, and looking one up
    by id (or by tracking/reference number via RQL).
- aid: 3plcentral:3plcentral-customers-api
