  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.3plcentral.com/
  baseURL: https://secure-wms.com
  properties:
  - url: https://developer.3plcentral.com/
    type: Documentation
  - url: openapi/3plcentral-openapi.yml
    type: OpenAPI
  - url: collections/3plcentral.postman_collection.json
    type: PostmanCollection
  - url: collections/3plcentral.opencollection.json
    type: OpenCollection
  description: Enumerate warehouses/facilities and their bin locations via
    /inventory/facilities and /inventory/facilities/{facilityId}/locations.
    Facilities and locations are the physical topology that inventory, receivers,
    and orders are placed and picked against.
- aid: 3plcentral:3plcentral-packages-api
  name: 3PL Warehouse Manager Packages API
  tags:
