aid: 3plcentral
url: https://raw.githubusercontent.com/api-evangelist/3plcentral/refs/heads/main/apis.yml
name: 3PL Warehouse Manager
kind: company
description: 3PL Warehouse Manager is the flagship cloud warehouse management system
  (WMS) built for third-party logistics providers, now sold under Extensiv and
  historically known as "3PL Central". Its public integration surface is the SecureWMS
  REST API (base https://secure-wms.com), used to create and retrieve orders,
  manage items and inventory, read stock summaries and stock details, submit and
  track inbound receivers (ASN), and enumerate customers, warehouses/facilities,
  and locations. Authentication is OAuth 2.0 client-credentials against
  https://secure-wms.com/AuthServer/api/Token, returning a short-lived bearer token
  (typically valid 30-60 minutes). This entry documents the 3PL Warehouse Manager /
  SecureWMS API specifically; the broader Extensiv company (which also spans
  Order Management, Integration Manager, Fulfillment Marketplace, and Warehouse
  Analytics) is tracked complementarily under the all/extensiv company entry.
