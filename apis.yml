apis:
- aid: 3plcentral:3plcentral-orders-api
  name: 3PL Warehouse Manager Orders API
  tags:
  - Orders
  - Fulfillment
  - Outbound
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.3plcentral.com/
  baseURL: https://secure-wms.com
  properties:
  - url: https://developer.3plcentral.com/
    type: Documentation
  - url: https://developer.extensiv.com/pages/3pl-wareshouse-manager.html
    type: APIReference
  - url: openapi/3plcentral-openapi.yml
    type: OpenAPI
  - url: collections/3plcentral.postman_collection.json
    type: PostmanCollection
  - url: collections/3plcentral.opencollection.json
    type: OpenCollection
  description: Create, retrieve, and list outbound orders in 3PL Warehouse Manager -
    the most common use of the SecureWMS API. Orders carry customer, ship-to,
    line items, and shipping details; results are paged (pgsiz/pgnum) and filterable
    with Resource Query Language (RQL).
- aid: 3plcentral:3plcentral-items-api
  name: 3PL Warehouse Manager Items API
  tags:
  - Items
  - SKUs
  - Catalog
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.3plcentral.com/
  baseURL: https://secure-wms.com
  properties:
  - url: https://developer.3plcentral.com/
    type: Documentation
  - url: openapi/3plcentral-openapi.yml
    type: OpenAPI
  - url: collections/3plcentral.postman_collection.json
    type: PostmanCollection
  - url: collections/3plcentral.opencollection.json
    type: OpenCollection
  description: List and read the SKU items defined for a customer under
    /customers/{customerId}/items. Items describe the goods a 3PL stores and ships
    on behalf of each customer, and are paged and sortable (e.g. by last modified date).
- aid: 3plcentral:3plcentral-inventory-api
  name: 3PL Warehouse Manager Inventory API
  tags:
  - Inventory
  - Stock Details
  - Lots
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.3plcentral.com/
  baseURL: https://secure-wms.com
  properties:
  - url: https://developer.3plcentral.com/
    type: Documentation
  - url: openapi/3plcentral-openapi.yml
    type: OpenAPI
  - url: collections/3plcentral.postman_collection.json
    type: PostmanCollection
  - url: collections/3plcentral.opencollection.json
    type: OpenCollection
  description: Retrieve on-hand inventory received on or before a point in time via
    /inventory and per-receive-line stock details via /inventory/stockdetails.
    Records include facility, item, lot, expiration, and received-date attributes,
    paged and filterable with RQL.
- aid: 3plcentral:3plcentral-stock-summaries-api
  name: 3PL Warehouse Manager Stock Summaries API
  tags:
