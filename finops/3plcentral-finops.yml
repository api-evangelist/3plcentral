meters:
- name: orders
  description: Outbound orders created/processed - a common contracted volume driver.
  unit: orders
  aggregation: sum
  dimensions:
  - account
  - customer
  - facility
- name: transactions
  description: Warehouse transactions (receipts, adjustments, shipments) processed.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - customer
  - facility
- name: customers
  description: Number of customers/brands served in the warehouse (multi-tenant scope).
  unit: customers
  aggregation: max
  dimensions:
  - account
- name: integrations
  description: Number of connected sales channels, carriers, and systems.
  unit: integrations
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Track orders and transactions per customer and facility so the subscription cost maps to who and what is driving warehouse volume.
- name: Allocation
  description: Allocate the WMS subscription across the customers/brands served, using the multi-tenant customer boundary as the cost-center key.
- name: Optimization
  description: Consolidate integrations, right-size the contracted tier to actual order/transaction volume, and use RQL-filtered API pulls to avoid unnecessary processing.
- name: Accountability
  description: Assign owners per customer account; review order/transaction volume against contracted tiers ahead of renewal.
