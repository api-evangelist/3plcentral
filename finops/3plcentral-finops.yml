description: >-
  FinOps view of 3PL Warehouse Manager (Extensiv, formerly 3PL Central) spend.
  The product is a subscription SaaS WMS billed on a quote-based, contact-sales
  basis - typically shaped by warehouse/customer volume, order and transaction
  counts, enabled modules, and integrations - rather than by metered API calls.
  The SecureWMS REST API is included in the subscription; deep technical API
  onboarding is a separate paid Developer Enablement package. Because billing is
  contractual rather than pay-per-request, the FinOps focus is allocating the
  subscription across the customers/brands served in the warehouse and tracking
  order/transaction volume against contracted tiers.
notes: >-
  Per-unit rates are not public; all pricing is contact-sales. Meters below are
  the business drivers Extensiv contracts commonly key on (orders, transactions,
  customers, integrations), not published billing meters. Reconcile with the
  actual contract. This entry covers 3PL Warehouse Manager; the wider Extensiv
  suite is tracked under all/extensiv.
